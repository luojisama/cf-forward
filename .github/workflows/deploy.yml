name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate required secrets
        shell: bash
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID ACCESS_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Write Worker secrets file
        shell: bash
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          import { mkdirSync, writeFileSync } from "node:fs";

          const token = process.env.ACCESS_TOKEN;
          if (!token) {
            throw new Error("Missing GitHub secret ACCESS_TOKEN");
          }

          mkdirSync(".wrangler", { recursive: true });
          writeFileSync(".wrangler/secrets.json", JSON.stringify({ ACCESS_TOKEN: token }));
          NODE

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --keep-vars --secrets-file .wrangler/secrets.json

      - name: Remove temporary secrets file
        if: always()
        run: rm -f .wrangler/secrets.json
